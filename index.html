<!DOCTYPE html>
<html>
<head>
    <title>Delta's Workshop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-row">

    <div class="order-panel">
        <h2>Current Order</h2>
        <p id="orderName"></p>

        <h3>Needed Parts</h3>
        <ul id="recipe"></ul>
    </div>

    <div class="money-panel">
        💰 $<span id="money">0</span>
    </div>

</div>


<div class="delta-panel">

    <div class="delta-orb">◉</div>

    <h2>DELTA</h2>

    <p id="delta">
        Assembly request received.
    </p>

</div>


<div class="resource-panel">

    <h2>WORKBENCH</h2>

    <button onclick="selectPart('Lens')">Lens</button>

    <button onclick="selectPart('Processor')">Processor</button>

    <button onclick="selectPart('Power Cell')">Power Cell</button>

    <button onclick="selectPart('Memory Chip')">Memory Chip</button>

    <button onclick="selectPart('Battery')">Battery</button>

    <button onclick="selectPart('Gyroscope')">Gyroscope</button>

</div>


<h3>Selected Parts</h3>

<ul id="selected"></ul>


<div class="action-panel">

    <button onclick="build()">BUILD</button>

    <button onclick="nextOrder()">NEXT ORDER</button>

</div>


<script src="script.js"></script>

</body>
</html>
